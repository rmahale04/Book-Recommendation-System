<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Genre</title>


<style>
    * {
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #6f7ae0, #7b4bb7);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: #fff;
        width: 420px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #6f7ae0;
        margin-bottom: 20px;
    }

    label {
        font-weight: 600;
        font-size: 14px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        margin-bottom: 18px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    input:focus {
        outline: none;
        border-color: #6f7ae0;
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #6f7ae0, #7b4bb7);
        border: none;
        color: #fff;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        text-decoration: none;
        color: #6f7ae0;
    }

    .flash {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        text-align: center;
        font-size: 14px;
    }

    .flash.success { background: #d4edda; color: #155724; }
    .flash.warning { background: #fff3cd; color: #856404; }
    .flash.error { background: #f8d7da; color: #721c24; }

    .note {
        font-size: 12px;
        color: #555;
        margin-bottom: 10px;
        text-align: center;
    }
</style>


</head>

<body>

<div class="container">
    <h2>Edit Genre</h2>


<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
{% endwith %}

<!-- <div class="note">
    ⚠️ If genre already exists, it will be merged automatically.
</div> -->

<!-- FORM -->
<form method="POST" action="{{ url_for('edit_genre', genre_id=genre.genre_id) }}">
    
    <label>Genre Name</label>
    <input type="text" name="genre_name"
           value="{{ genre.genre_name }}" required>

    <button type="submit">Update Genre</button>
</form>

<a href="{{ url_for('admin_dashboard') }}" class="back-link">
    ← Back to Dashboard
</a>

</div>

</body>
</html>
